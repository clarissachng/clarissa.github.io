baseURL: https://clarissa.github.io/
languageCode: en # zh-cn
title: clarissa
theme: PaperMod

enableInlineShortcodes: true
enableEmoji: true # allowing using emoji
enableRobotsTXT: true

hasCJKLanguage: true

buildDrafts: false
buildFuture: false
buildExpired: false

#googleAnalytics: UA-123-45

paginate: 15 # articles per page

minify:
    disableXML: true
    # minifyOutput: true

permalinks:
    post: "/:title/"
    # post: "/:year/:month/:day/:title/"

defaultContentLanguage: en # prefer language
defaultContentLanguageInSubdir: true

languages:
    en:
        languageName: "English"
        contentDir: content
        weight: 1
        profileMode:
            enabled: true
            title: Clarissa Ch'ng
            subtitle: "hi, i'm clarissa ⋆｡°✩"
            # imageUrl: "Avatar.png"
            imageUrl: "own_picture.png"
            imageTitle: Selfie
            imageWidth: 150
            imageHeight: 150
            buttons:
                - name: about
                  url: about
                - name: project
                  url: projects
                - name: resume
                  url: resume.pdf

        menu:
            main:
                - identifier: about
                  name: about
                  url: about
                  weight: 1
                - identifier: projects
                  name: project
                  url: projects
                  weight: 2
                - identifier: resume
                  name: resume
                  url: resume.pdf
                  weight: 3
                - identifier: search
                  name: search
                  url: search
                  weight: 5

outputs:
    home:
        - HTML
        - RSS
        - JSON

params:
    env: production # to enable google analytics, opengraph, twitter-cards and schema.
    title: clarissa
    author: clarissa

    defaultTheme: light # defaultTheme: light or dark
    disableThemeToggle: false
    DateFormat: "2006-01-02"
    ShowShareButtons: true
    ShowReadingTime: true
    # disableSpecialistPost: true
    disableScrollToTop: false
    displayFullLangName: true
    ShowPostNavLinks: true
    ShowBreadCrumbs: true
    ShowCodeCopyButtons: true
    hideFooter: false # hide foot
    ShowWordCounts: true
    VisitCount: true

    ShowLastMod: true

    ShowToc: true
    TocOpen: true

    comments: true

    socialIcons:
        - name: instagram
          url: "https://www.instagram.com/clxrvssa/"
        - name: github
          url: "https://github.com/clarissachng"
        - name: linkedin
          url: "https://www.linkedin.com/in/clarissa-chng/"
        - name: email
          url: "mailto:clarissachnggg@gmail.com"

    assets:
        favicon: "tulip.png"
        favicon16x16: "tulip.png"
        favicon32x32: "tulip.png"
        apple_touch_icon: "tulip.png"
        safari_pinned_tab: "tulip.png"

    label:
        text: "home"

    fuseOpts:
        isCaseSensitive: false
        shouldSort: true
        location: 0
        distance: 1000
        threshold: 1
        minMatchCharLength: 0
        keys: ["title", "permalink", "summary"]

    twikoo:
        version: 1.4.11

taxonomies:
    category: categories
    tag: tags
    series: series

markup:
    goldmark:
        renderer:
            unsafe: true
    highlight:
        # anchorLineNos: true
        codeFences: true
        guessSyntax: true
        lineNos: true
        # noClasses: false
        style: monokai
        lineNos: false

privacy:
    vimeo:
        disabled: false
        simple: true

    twitter:
        disabled: false
        enableDNT: true
        simple: true

    instagram:
        disabled: false
        simple: true

    youtube:
        disabled: false
        privacyEnhanced: true

services:
    instagram:
        disableInlineCSS: true
    twitter:
        disableInlineCSS: true
